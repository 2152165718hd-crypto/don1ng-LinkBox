name: don1ng_linkbox
description: don1ng LinkBox - local-first OneNET Studio IoT dashboard framework for Android.
publish_to: "none"
version: 0.9.1+12

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  crypto: ^3.0.6
  dio: ^5.7.0
  file_picker: ^8.1.7
  fl_chart: ^1.2.0
  flutter_riverpod: ^2.6.1
  flutter_secure_storage: ^9.2.4
  flutter_svg: ^2.2.4
  image_picker: ^1.1.2
  mqtt_client: ^10.5.1
  path: ^1.9.1
  path_provider: ^2.1.5
  sqflite: ^2.4.2+1
  uuid: ^4.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/branding/linkbox_cover.png
    - assets/branding/linkbox_icon_1024.png
    - assets/iot_icons/
    - assets/vector_icons/
