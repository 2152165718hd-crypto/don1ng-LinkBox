publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  charset_converter: ^2.3.0
  crypto: ^3.0.6
  dio: ^5.7.0
  file_picker: ^8.1.7
  fl_chart: ^0.70.3
